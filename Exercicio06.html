<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filhos da mãe russia</title>

<body>
  <header>
    <h1>A busca pelos irmãos</h1>
    <img src=".\IMG\Mãerussia.jpg" width="25%">
    <p>45 anos procurando incessantemente pelos meus irmãos russos que reencarnaram no Brasil. </p>

  <hr>
  <main>
    <h3>Análise de cadastro</h3>
    <p>Preencha os campos abaixo e analisaremos seus dados.<br>Se tudo estiver correto ligaremos para marcar uma visita.
    </p>
    <form method="post" action="#">
      <fieldset>
        <legend>Dados pessoais</legend>
        <label>Nome</label>
        <input type="text" name="nome" placeholder="digite seu nome" required>
        <label>Data de Nascimento</label>
        <input type="date" name="data_nascimento" required>
        <label>Telefone</label>
        <input type="tel" name="telefone" placeholder="(XX) XXXXX-XXXX" required>
      </fieldset>
      
      <fieldset>
        <legend>CNH</legend>
        <label>Número do Registro</label>
        <input type="number" name="numero_registro" placeholder="informe o número da sua CNH" required>
        <label>Validade</label>
        <input type="date" name="validade" required>
      </fieldset>

      <fueldset>
        <legend>Gênero do Irmão</legend>
        <label>Tipos de gêneros</label>
        <selection name="Gênero" required>
          <option value="">Escolha um gênero</option>
          <optgroup>
            <option value=""></option>
            <option value=""></option>
            <option value=""></option>
          </optgroup>

          <optgroup>
            <option value=""></option>
            <option value=""></option>
            <option value=""></option>
          </optgroup>
        </selection>
      </fueldset>

    </form>
  </main>
</body>
